name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal default token scope for all jobs; the release job opts into more below.
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v1
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v1
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v1
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      # Build first: two api-surface tests import the built ./dist package.
      - name: Build
        run: bun run build
      - name: Run tests
        run: bun run test:ci

  benchmark:
    name: Benchmarks
    needs: [lint, typecheck, test]
    # Full benchmark suite is slow and machine-variable; run it post-merge on
    # main (the canonical baseline environment), not as a per-PR gate.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v1
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Run benchmarks
        run: bun run bench:ci

  release:
    name: Create release
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write # npm OIDC trusted publishing (tokenless)

    steps:
      # fetch-depth: 0 + fetch-tags: true so semantic-release sees prior version
      # tags (e.g. v4.1.0) and computes the next version correctly.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: oven-sh/setup-bun@v1
      # No registry-url here: it writes an .npmrc that interferes with the OIDC
      # publish path. semantic-release/npm authenticates via the GitHub Actions
      # OIDC token (id-token: write above) against npm's trusted publisher.
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      # npm OIDC trusted publishing requires npm >= 11.5.1; node 22 ships ~10.9.
      - name: Update npm for OIDC
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install && bun run docs:generate

      # Build dist before publishing — the package ships files: ["dist"].
      - name: Build
        run: bun run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release
